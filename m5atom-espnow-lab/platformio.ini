; PlatformIO Project Configuration File
;
; https://docs.platformio.org/page/projectconf.html

; Common settings
[common]
platform = espressif32
framework = arduino
monitor_speed = 115200

; Atom Lite (for 02/03/04, copy the corresponding main.cpp from examples/ to src/main.cpp)
[env:atom]
platform = ${common.platform}
board = m5stack-atom
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps =
    m5stack/M5Atom
    fastled/FastLED
    ESP32Async/ESPAsyncWebServer
    ESP32Async/AsyncTCP

; Basic V2.7
[env:basic]
platform = ${common.platform}
board = m5stack-core-esp32
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps =
    m5stack/M5Unified
    m5stack/M5GFX

; ESP-NOW pairing - Hub (Basic V2.7)
[env:pairing_hub]
platform = ${common.platform}
board = m5stack-core-esp32
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps =
    m5stack/M5Unified
    m5stack/M5GFX
build_src_filter = -<*> +<../examples/06_espnow_pairing/hub/>

; ESP-NOW pairing - Node (Atom Lite)
[env:pairing_node]
platform = ${common.platform}
board = m5stack-atom
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps =
    m5stack/M5Atom
    fastled/FastLED
build_src_filter = -<*> +<../examples/06_espnow_pairing/node/>
