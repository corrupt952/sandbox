apiVersion: v1
kind: Namespace
metadata:
  name: preview-{{ .Values.previewId }}-sample-app
  labels:
    preview-id: "{{ .Values.previewId }}"
    component: sample-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: preview-{{ .Values.previewId }}-sample-app
  labels:
    app: sample-app
    preview-id: "{{ .Values.previewId }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
        preview-id: "{{ .Values.previewId }}"
    spec:
      containers:
        - name: sample-app
          image: {{ .Values.sampleApp.image }}
          ports:
            - name: http
              containerPort: {{ .Values.sampleApp.port }}
          env:
            - name: HYDRA_PUBLIC_URL
              value: http://hydra.preview-{{ .Values.previewId }}-hydra.svc.cluster.local:4444
            - name: HYDRA_ADMIN_URL
              value: http://hydra.preview-{{ .Values.previewId }}-hydra.svc.cluster.local:4445
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: preview-{{ .Values.previewId }}-sample-app
  labels:
    app: sample-app
    preview-id: "{{ .Values.previewId }}"
spec:
  selector:
    app: sample-app
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-app
  namespace: preview-{{ .Values.previewId }}-sample-app
  labels:
    app: sample-app
    preview-id: "{{ .Values.previewId }}"
spec:
  rules:
    - host: app-{{ .Values.previewId }}.preview.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sample-app
                port:
                  number: 80
